<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MooseBridge Global Picture</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css">
  <link rel="stylesheet" href="/assets/map.css?v=2">
</head>
<body>
  <main class="app-shell">
    <div id="map" aria-label="Global DCS situation picture"></div>

    <header class="topbar">
      <div class="brand">MooseBridge</div>
      <div class="status-line">
        <span id="connection-dot" class="status-dot is-offline" aria-hidden="true"></span>
        <span id="connection-text">Connecting</span>
        <span class="separator" aria-hidden="true"></span>
        <span id="dcs-clock">DCS --</span>
        <span id="mission-clock">Mission --</span>
      </div>
      <button id="layers-toggle" class="icon-button" type="button" title="Toggle map layers" aria-controls="layer-panel" aria-expanded="true">
        <i data-lucide="layers-3"></i>
      </button>
    </header>

    <aside id="layer-panel" class="layer-panel" aria-label="Map layers">
      <div class="panel-heading">
        <span>Map display</span>
        <span id="feature-count" class="muted">0 objects</span>
      </div>
      <div class="panel-tabs" role="tablist" aria-label="Map display settings">
        <button id="layers-tab" class="panel-tab is-active" type="button" role="tab" aria-selected="true" aria-controls="layer-controls">Layers</button>
        <button id="filters-tab" class="panel-tab" type="button" role="tab" aria-selected="false" aria-controls="filter-controls">Filters</button>
      </div>
      <div id="layer-controls" class="layer-controls" role="tabpanel" aria-labelledby="layers-tab"></div>
      <div id="filter-controls" class="filter-controls" role="tabpanel" aria-labelledby="filters-tab" hidden></div>
    </aside>

    <aside id="detail-panel" class="detail-panel" aria-label="Object details" hidden>
      <div class="panel-heading">
        <div class="detail-heading-text">
          <div id="detail-type" class="eyebrow"></div>
          <div id="detail-title" class="detail-title"></div>
          <div id="detail-subtitle" class="detail-subtitle"></div>
        </div>
        <div class="detail-actions">
          <button id="detail-focus" class="icon-button" type="button" title="Focus on map"><i data-lucide="locate-fixed"></i></button>
          <button id="detail-copy" class="icon-button" type="button" title="Copy object ID"><i data-lucide="copy"></i></button>
          <button id="detail-close" class="icon-button" type="button" title="Close details"><i data-lucide="x"></i></button>
        </div>
      </div>
      <div id="detail-badges" class="detail-badges"></div>
      <div id="detail-sections" class="detail-sections"></div>
    </aside>

    <div id="error-banner" class="error-banner" role="status" hidden></div>
  </main>

  <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script src="/assets/map.js?v=10"></script>
</body>
</html>
